<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1Agamert | Minecraft & Bloxd Packs</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            text-align: center;
        }

        /* شريط اللغات */
        .language-selector {
            background-color: #1f1f1f;
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            border-bottom: 1px solid #333;
        }

        .lang-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            color: #bbb;
        }

        .flag { width: 18px; height: 12px; border-radius: 2px; }

        header { padding: 40px 20px; background: linear-gradient(180deg, #1f1f1f 0%, #121212 100%); }
        h1 { margin: 0; font-size: 2.5rem; color: #007bff; }

        .sub-button {
            background-color: #ff0000;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            display: inline-block;
            margin: 20px 0;
            transition: 0.3s;
        }

        .sub-button:hover { transform: scale(1.05); background-color: #cc0000; }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; padding: 40px 20px; }

        /* تنسيق بطاقة ماين كرافت الجديدة */
        .pack-card {
            background: #1e1e1e;
            border-radius: 15px;
            overflow: hidden;
            width: 320px;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .pack-card:hover { border-color: #28a745; transform: translateY(-5px); }
        .pack-card img { width: 100%; height: 180px; object-fit: cover; }
        .pack-info { padding: 20px; }

        .minecraft-title {
            color: #28a745; /* لون أخضر مميز لماين كرافت */
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .download-btn {
            background: #28a745;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 5px;
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        .download-btn:hover { background: #218838; }

        footer { background-color: #0a0a0a; padding: 30px 20px; border-top: 1px solid #222; margin-top: 40px; }
        .created-by { color: #fff; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="language-selector">
        <div class="lang-item"><img src="https://flagcdn.com/sa.svg" class="flag"> العربية</div>
        <div class="lang-item"><img src="https://flagcdn.com/us.svg" class="flag"> English</div>
        <div class="lang-item"><img src="https://flagcdn.com/de.svg" class="flag"> Deutsch</div>
        <div class="lang-item"><img src="https://flagcdn.com/es.svg" class="flag"> Español</div>
        <div class="lang-item"><img src="https://flagcdn.com/fr.svg" class="flag"> Français</div>
    </div>

    <header>
        <h1>1Agamert Workspace</h1>
        <a href="https://www.youtube.com/@1Agamert?sub_confirmation=1" target="_blank" class="sub-button">
            اشترك في قناة 1Agamert 
        </a>
    </header>

    <div class="container">
        <div class="pack-card">
            <img src="https://via.placeholder.com/320x180?text=Minecraft+Packs" alt="Minecraft Preview">
            <div class="pack-info">
                <div class="minecraft-title">
                    Minecraft Texture Packs ©
                </div>
                <p>مجموعة حزم موارد ماين كرافت الحصرية الخاصة بي.</p>
                <a href="https://drive.google.com/drive/folders/1uNZYYAgx72uszVLPHRMKqAYD6AB-wty9" target="_blank" class="download-btn">
                    تحميل الحزم من Google Drive
                </a>
            </div>
        </div>

        </div>

    <footer>
        <div class="copyright">© 2026 جميع الحقوق محفوظة لـ 1Agamert</div>
        <div class="created-by">By <span>1Agamert</span></div>
    </footer>

</body>
</html>
