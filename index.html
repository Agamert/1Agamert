<!DOCTYPE html>

    <title>1Agamert | Minecraft & Bloxd Packs</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            text-align: center;
            transition: 0.3s;
        }

        /* شريط اللغات العلوي */
        .language-selector {
            background-color: #1f1f1f;
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            border-bottom: 1px solid #333;
        }

        .lang-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #bbb;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 5px;
            transition: 0.2s;
        }

        .lang-item:hover { background: #333; color: #fff; }
        .flag { width: 20px; height: 14px; border-radius: 2px; pointer-events: none; }

        header { padding: 40px 20px; background: linear-gradient(180deg, #1f1f1f 0%, #121212 100%); }
        h1 { margin: 0; font-size: 2.2rem; color: #007bff; }

        /* زر الاشتراك في اليوتيوب */
        .sub-button {
            background-color: #ff0000;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            display: inline-block;
            margin: 20px 0;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
        }

        .sub-button:hover { transform: scale(1.05); background-color: #cc0000; }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; padding: 40px 20px; }

        /* بطاقة الحزمة */
        .pack-card {
            background: #1e1e1e;
            border-radius: 15px;
            overflow: hidden;
            width: 320px;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .pack-card:hover { border-color: #28a745; transform: translateY(-5px); }
        .minecraft-title { color: #28a745; font-weight: bold; margin-bottom: 10px; font-size: 1.2rem; }
        .pack-info { padding: 20px; }

        /* زر التحميل الأخضر */
        .download-btn {
            background: #28a745;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 5px;
            display: block;
            margin-top: 15px;
            font-weight: bold;
            transition: 0.2s;
        }

        .download-btn:hover { background: #218838; }

        /* أسفل الصفحة والحقوق */
        footer { background-color: #0a0a0a; padding: 30px 20px; border-top: 1px solid #222; margin-top: 40px; }
        .created-by { font-weight: bold; font-size: 1.1rem; margin-top: 10px; }
        .created-by span { color: #007bff; }
    </style>
</head>
