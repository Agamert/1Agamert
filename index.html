<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1Agamert | Minecraft & Bloxd Packs</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            text-align: center;
            transition: 0.3s;
        }

        /* شريط اللغات */
        .language-selector {
            background-color: #1f1f1f;
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            border-bottom: 1px solid #333;
        }

        .lang-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #bbb;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 5px;
            transition: 0.2s;
        }

        .lang-item:hover { background: #333; color: #fff; }
        .flag { width: 20px; height: 14px; border-radius: 2px; pointer-events: none; }

        header { padding: 40px 20px; background: linear-gradient(180deg, #1f1f1f 0%, #121212 100%); }
        
        .brand-name { margin: 0; font-size: 1.5rem; color: #007bff; font-weight: normal; }
        .version-text { margin: 5px 0 0 0; font-size: 3rem; font-weight: bold; color: #ffffff; }

        .sub-button {
            background-color: #ff0000;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            display: inline-block;
            margin: 25px 0;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
        }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; padding: 40px 20px; }

        .pack-card {
            background: #1e1e1e;
            border-radius: 15px;
            overflow: hidden;
            width: 320px;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .pack-card:hover { border-color: #28a745; transform: translateY(-5px); }
        .minecraft-title { color: #28a745; font-weight: bold; margin-bottom: 10px; font-size: 1.2rem; }
        .pack-info { padding: 20px; }

        .download-btn {
            background: #28a745;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 5px;
            display: block;
            margin-top: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .download-btn:hover { background: #218838; }

        footer { background-color: #0a0a0a; padding: 30px 20px; border-top: 1px solid #222; margin-top: 40px; }
    </style>
</head>
<body>

    <div class="language-selector">
        <div class="lang-item" onclick="changeLanguage('ar')"><img src="https://flagcdn.com/sa.svg" class="flag"> العربية</div>
        <div class="lang-item" onclick="changeLanguage('en')"><img src="https://flagcdn.com/us.svg" class="flag"> English</div>
        <div class="lang-item" onclick="changeLanguage('hi')"><img src="https://flagcdn.com/in.svg" class="flag"> हिन्दी</div>
        <div class="lang-item" onclick="changeLanguage('zh')"><img src="https://flagcdn.com/cn.svg" class="flag"> 中文</div>
        <div class="lang-item" onclick="changeLanguage('ja')"><img src="https://flagcdn.com/jp.svg" class="flag"> 日本語</div>
        <div class="lang-item" onclick="changeLanguage('id')"><img src="https://flagcdn.com/id.svg" class="flag"> Indonesia</div>
        <div class="lang-item" onclick="changeLanguage('de')"><img src="https://flagcdn.com/de.svg" class="flag"> Deutsch</div>
        <div class="lang-item" onclick="changeLanguage('it')"><img src="https://flagcdn.com/it.svg" class="flag"> Italiano</div>
        <div class="lang-item" onclick="changeLanguage('fr')"><img src="https://flagcdn.com/fr.svg" class="flag"> Français</div>
        <div class="lang-item" onclick="changeLanguage('uk')"><img src="https://flagcdn.com/ua.svg" class="flag"> Українська</div>
        <div class="lang-item" onclick="changeLanguage('ru')"><img src="https://flagcdn.com/ru.svg" class="flag"> Русский</div>
    </div>

    <header>
        <h2 class="brand-name" id="main-title">by 1Agamert</h2>
        <h1 class="version-text">V.1.1.9</h1>
        <a href="https://www.youtube.com/@1Agamert?sub_confirmation=1" target="_blank" class="sub-button" id="sub-text">Subscribe to 1Agamert</a>
    </header>

    <div class="container">
        <div class="pack-card">
            <img src="https://via.placeholder.com/320x180?text=Minecraft+Packs" alt="Minecraft Preview">
            <div class="pack-info">
                <div class="minecraft-title">Minecraft Texture Packs ©</div>
                <p id="pack-desc">My exclusive collection of Minecraft resource packs.</p>
                <a href="https://drive.google.com/uc?export=download&id=1uNZYYAgx72uszVLPHRMKqAYD6AB-wty9" class="download-btn" id="dl-text">Download ZIP</a>
            </div>
        </div>
    </div>

    <footer>
        <div id="footer-copy">© 2026 All Rights Reserved to 1Agamert</div>
        <div class="created-by">By <span>1Agamert</span></div>
    </footer>

    <script>
        const translations = {
            ar: { dir: "rtl", title: "بواسطة 1Agamert", sub: "اشترك في قناة 1Agamert", desc: "مجموعة حزم موارد ماين كرافت الحصرية الخاصة بي.", dl: "تحميل ZIP", copy: "© 2026 جميع الحقوق محفوظة لـ 1Agamert" },
            en: { dir: "ltr", title: "by 1Agamert", sub: "Subscribe to 1Agamert", desc: "My exclusive collection of Minecraft resource packs.", dl: "Download ZIP", copy: "© 2026 All Rights Reserved to 1Agamert" },
            hi: { dir: "ltr", title: "by 1Agamert", sub: "Subscribe to 1Agamert", desc: "माइनक्राफ्ट रिसोर्स पैक संग्रह।", dl: "ज़िप डाउनलोड करें", copy: "© 2026 सर्वाधिकार सुरक्षित" },
            zh: { dir: "ltr", title: "by 1Agamert", sub: "订阅 1Agamert", desc: "Minecraft 资源包收藏。", dl: "下载 ZIP", copy: "© 2026 保留所有权利" },
            ja: { dir: "ltr", title: "by 1Agamert", sub: "1Agamert を購読", desc: "Minecraft リソースパック。", dl: "ZIPをダウンロード", copy: "© 2026 無断転載を禁じます" },
            id: { dir: "ltr", title: "by 1Agamert", sub: "Berlangganan", desc: "Koleksi Minecraft saya.", dl: "Unduh ZIP", copy: "© 2026 Hak Cipta Dilindungi" },
            de: { dir: "ltr", title: "by 1Agamert", sub: "Abonnieren", desc: "Minecraft Ressourcenpakete.", dl: "ZIP herunterladen", copy: "© 2026 Alle Rechte vorbehalten" },
            it: { dir: "ltr", title: "by 1Agamert", sub: "Iscriviti", desc: "Pacchetti risorse Minecraft.", dl: "Scarica ZIP", copy: "© 2026 Tutti i diritti riservati" },
            fr: { dir: "ltr", title: "by 1Agamert", sub: "S'abonner", desc: "Packs de ressources Minecraft.", dl: "Télécharger le ZIP", copy: "© 2026 Tous droits réservés" },
            uk: { dir: "ltr", title: "by 1Agamert", sub: "Підписатися", desc: "Пакети ресурсів Minecraft.", dl: "Завантажити ZIP", copy: "© 2026 Усі права захищені" },
            ru: { dir: "ltr", title: "by 1Agamert", sub: "Подписаться", desc: "Ресурс-паки Minecraft.", dl: "Скачать ZIP", copy: "© 2026 Все права защищены" }
        };

        function changeLanguage(lang) {
            const data = translations[lang] || translations['en'];
            document.documentElement.dir = data.dir;
            document.documentElement.lang = lang;
            document.getElementById('main-title').innerText = data.title;
            document.getElementById('sub-text').innerText = data.sub;
            document.getElementById('pack-desc').innerText = data.desc;
            document.getElementById('dl-text').innerText = data.dl;
            document.getElementById('footer-copy').innerText = data.copy;
        }
    </script>
</body>
</html>
