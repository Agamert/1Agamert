<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1Agamert | Minecraft Packs</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            text-align: center;
            transition: 0.3s;
        }

        .language-selector {
            background-color: #1f1f1f;
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            border-bottom: 1px solid #333;
        }

        .lang-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: #bbb;
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 5px;
        }

        .lang-item:hover { background: #333; color: #fff; }
        .flag { width: 18px; height: 12px; border-radius: 2px; }

        header { padding: 40px 20px; background: linear-gradient(180deg, #1f1f1f 0%, #121212 100%); }
        
        .brand-name { margin: 0; font-size: 1.4rem; color: #007bff; font-weight: normal; }
        .version-text { margin: 5px 0 0 0; font-size: 3.5rem; font-weight: bold; color: #ffffff; }

        .sub-button {
            background-color: #ff0000;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            display: inline-block;
            margin: 25px 0;
            transition: 0.3s;
        }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; padding: 40px 20px; }

        .pack-card {
            background: #1e1e1e;
            border-radius: 15px;
            overflow: hidden;
            width: 320px;
            border: 1px solid #333;
        }

        .minecraft-title { color: #28a745; font-weight: bold; margin-bottom: 10px; font-size: 1.2rem; }
        .pack-info { padding: 20px; }

        .download-btn {
            background: #28a745;
            color: white;
            padding: 15px 20px;
            text-decoration: none;
            border-radius: 8px;
            display: block;
            margin-top: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.2s;
        }

        .download-btn:hover { background: #218838; }

        footer { background-color: #0a0a0a; padding: 30px 20px; border-top: 1px solid #222; margin-top: 40px; }
    </style>
</head>
<body>

    <div class="language-selector">
        <div class="lang-item" onclick="changeLanguage('ar')"><img src="https://flagcdn.com/sa.svg" class="flag"> العربية</div>
        <div class="lang-item" onclick="changeLanguage('en')"><img src="https://flagcdn.com/us.svg" class="flag"> English</div>
        </div>

    <header>
        <h2 class="brand-name" id="main-title">by 1Agamert</h2>
        <h1 class="version-text">V.1.1.9</h1>
        <a href="https://www.youtube.com/@1Agamert?sub_confirmation=1" target="_blank" class="sub-button" id="sub-text">Subscribe to 1Agamert</a>
    </header>

    <div class="container">
        <div class="pack-card">
            <img src="https://via.placeholder.com/320x180?text=Minecraft+Packs" alt="Minecraft Preview">
            <div class="pack-info">
                <div class="minecraft-title">Minecraft Texture Packs ©</div>
                <p id="pack-desc">My exclusive collection of Minecraft resource packs.</p>
                <a href="https://drive.google.com/uc?export=download&id=1uNZYYAgx72uszVLPHRMKqAYD6AB-wty9" class="download-btn" id="dl-text">Download Pack Now</a>
            </div>
        </div>
    </div>

    <footer>
        <div id="footer-copy">© 2026 All Rights Reserved to 1Agamert</div>
        <div class="created-by">By <span>1Agamert</span></div>
    </footer>

    <script>
        const translations = {
            ar: { dir: "rtl", title: "بواسطة 1Agamert", sub: "اشترك في قناة 1Agamert", desc: "مجموعة حزم موارد ماين كرافت الحصرية الخاصة بي.", dl: "تحميل الحزمة الآن", copy: "© 2026 جميع الحقوق محفوظة لـ 1Agamert" },
            en: { dir: "ltr", title: "by 1Agamert", sub: "Subscribe to 1Agamert", desc: "My exclusive collection of Minecraft resource packs.", dl: "Download Pack Now", copy: "© 2026 All Rights Reserved to 1Agamert" }
            // باقي الترجمات تتبع نفس النمط...
        };

        function changeLanguage(lang) {
            const data = translations[lang] || translations['en'];
            document.documentElement.dir = data.dir;
            document.getElementById('main-title').innerText = data.title;
            document.getElementById('sub-text').innerText = data.sub;
            document.getElementById('pack-desc').innerText = data.desc;
            document.getElementById('dl-text').innerText = data.dl;
            document.getElementById('footer-copy').innerText = data.copy;
        }
    </script>
</body>
</html>
